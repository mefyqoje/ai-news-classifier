name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black ruff pytest

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black . --check

      - name: Tests
        run: pytest